# Render Blueprint — deploys the whole stack from one file.
# In Render: New → Blueprint → connect this repo → Apply.
# (Frontend can alternatively go on Vercel; see docs/DEPLOY.md.)

databases:
  - name: wc2026-db
    plan: free
    databaseName: worldcup2026
    user: worldcup2026

services:
  # ── FastAPI backend ────────────────────────────────────────────────────────
  - type: web
    name: wc2026-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wc2026-db
          property: connectionString
      - key: APIFOOTBALL_KEY
        sync: false          # set this in the Render dashboard (secret)

  # ── React frontend (static) ────────────────────────────────────────────────
  - type: web
    name: wc2026-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: wc2026-api
          type: web
          property: url
    routes:
      - type: rewrite          # SPA: serve index.html for any path
        source: /*
        destination: /index.html
